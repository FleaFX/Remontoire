<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-labelledby="remontoire-mark-title">
  <title id="remontoire-mark-title">Remontoire mark</title>
  <style>
    .ink-fill   { fill: #1f2933; }
    .ink-stroke { stroke: #1f2933; }
    .accent-stroke { stroke: #d97757; }
    @media (prefers-color-scheme: dark) {
      .ink-fill   { fill: #f5f7fa; }
      .ink-stroke { stroke: #f5f7fa; }
      .accent-stroke { stroke: #f0b429; }
    }
  </style>

  <g transform="translate(60,60)">
    <g class="ink-fill">
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(0)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(36)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(72)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(108)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(144)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(180)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(216)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(252)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(288)"/>
      <rect x="-3.5" y="-38" width="7" height="11" rx="1.2" transform="rotate(324)"/>
    </g>
    <circle r="27" fill="none" stroke-width="7" class="ink-stroke"/>
    <circle r="5.5" class="ink-fill"/>
    <line x1="0" y1="0" x2="16" y2="-16" stroke-width="5" stroke-linecap="round" class="accent-stroke"/>
  </g>
</svg>
