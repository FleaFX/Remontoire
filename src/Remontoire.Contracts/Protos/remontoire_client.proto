syntax = "proto3";
package remontoire.client.v1;

import "google/protobuf/empty.proto";

service RemontoireClient {
  rpc Publish(PublishRequest) returns (PublishReply);
  rpc Consume(ConsumeRequest) returns (stream ConsumeReply);
  rpc Ack(AckRequest) returns (AckReply);
}

message PublishRequest {
  string stream_name = 1;
  bytes partition_key = 2;
  repeated MessageHeader headers = 3;
  bytes payload = 4;
}

message MessageHeader {
  bytes key = 1;
  bytes value = 2;
}

message PublishReply {
  oneof result {
    PublishSuccess success = 1;
    NotLeader not_leader = 2;
  }
}

message PublishSuccess {
  int32 shard_id = 1;
  uint64 offset = 2;
  uint64 ingested_at_micros = 3;
}

// Shared by every RPC below — the wire form of a not-the-leader refusal.
message NotLeader {
  string stream_name = 1;
  // The redirect target's address (not a bare node ID — the client cannot resolve a node ID to
  // an address by itself; the server does that translation).
  optional string leader_address = 2;
}

message ConsumeRequest {
  string stream_name = 1;
  string consumer_group = 2;
}

message ConsumeReply {
  oneof result {
    RemontoireMessageProto message = 1;
    NotLeader not_leader = 2; // strict-ack mode always routes every stream to the leader
  }
}

message RemontoireMessageProto {
  int32 shard_id = 1;
  uint64 offset = 2;
  bytes partition_key = 3;
  bytes payload = 4;
  repeated MessageHeader headers = 5;
  uint64 ingested_at_micros = 6;
}

message AckRequest {
  string stream_name = 1;
  string consumer_group = 2;
  int32 shard_id = 3;
  // Batch-ack: usually one offset, sometimes a run — both cases share this one field, no
  // separate singular/plural distinction needed.
  repeated uint64 offsets = 4;
}

message AckReply {
  oneof result {
    google.protobuf.Empty success = 1;
    NotLeader not_leader = 2;
  }
}
