<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" role="img" aria-labelledby="remontoire-logo-title">
  <title id="remontoire-logo-title">Remontoire</title>
  <style>
    .ink-fill   { fill: #1f2933; }
    .ink-stroke { stroke: #1f2933; }
    .accent-fill   { fill: #d97757; }
    .accent-stroke { stroke: #d97757; }
    .muted-fill { fill: #9aa5b1; }
    .word { fill: #1f2933; font-family: "Segoe UI", Arial, sans-serif; font-weight: 600; letter-spacing: 5px; }
    @media (prefers-color-scheme: dark) {
      .ink-fill   { fill: #f5f7fa; }
      .ink-stroke { stroke: #f5f7fa; }
      .accent-fill   { fill: #f0b429; }
      .accent-stroke { stroke: #f0b429; }
      .muted-fill { fill: #7b8794; }
      .word { fill: #f5f7fa; }
    }
  </style>

  <!-- irregular input: bursty, unevenly spaced arrivals -->
  <g class="muted-fill">
    <rect x="9"  y="56" width="4" height="8"  rx="1.5"/>
    <rect x="21" y="48" width="4" height="16" rx="1.5"/>
    <rect x="27" y="60" width="4" height="6"  rx="1.5"/>
    <rect x="43" y="52" width="4" height="12" rx="1.5"/>
  </g>

  <!-- the mechanism: absorbs irregular input, releases regular output -->
  <g transform="translate(85,60)">
    <g class="ink-fill">
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(0)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(36)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(72)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(108)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(144)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(180)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(216)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(252)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(288)"/>
      <rect x="-3" y="-31" width="6" height="9" rx="1" transform="rotate(324)"/>
    </g>
    <circle r="22" fill="none" stroke-width="6" class="ink-stroke"/>
    <circle r="4.5" class="ink-fill"/>
    <line x1="0" y1="0" x2="13" y2="-13" stroke-width="4" stroke-linecap="round" class="accent-stroke"/>
  </g>

  <!-- regular output: steady, evenly spaced release -->
  <g class="accent-fill">
    <rect x="118" y="53" width="4" height="14" rx="1.5"/>
    <rect x="131" y="53" width="4" height="14" rx="1.5"/>
    <rect x="144" y="53" width="4" height="14" rx="1.5"/>
    <rect x="157" y="53" width="4" height="14" rx="1.5"/>
  </g>

  <!-- wordmark -->
  <text x="190" y="71" font-size="32" class="word">REMONTOIRE</text>
</svg>
