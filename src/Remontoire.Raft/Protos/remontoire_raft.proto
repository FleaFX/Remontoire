syntax = "proto3";
package remontoire.raft.v1;

service RaftTransport {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message VoteRequest {
  string group_id = 1;
  uint64 term = 2;
  string candidate_id = 3;
  uint64 last_log_index = 4;
  uint64 last_log_term = 5;
}

message VoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  string group_id = 1;
  uint64 term = 2;
  string leader_id = 3;
  uint64 prev_log_index = 4;
  uint64 prev_log_term = 5;
  repeated bytes entries = 6;
  uint64 leader_commit = 7;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}

message InstallSnapshotRequest {
  string group_id = 1;
  uint64 term = 2;
  string leader_id = 3;
  uint64 last_included_index = 4;
  uint64 last_included_term = 5;
  uint64 offset = 6; // byte offset within the current file (file_name), not within the whole snapshot
  bytes data = 7;
  bool done = 8; // true on the final chunk of the final file — the whole snapshot transfer is complete
  // Lets the receiver set its own next-logical-offset floor directly, instead of re-deriving
  // it — it has no log entries of its own to scan from yet.
  uint64 next_logical_offset = 9;
  string file_name = 10; // bare filename (no directory) this chunk belongs to
  bool file_done = 11; // true on the final chunk of this file; a different file_name may follow unless `done` is also set
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

// The WalRecordType.ShardConfigChange payload — the full new member list (not a delta), so
// recovery can read it back idempotently without replaying every prior change. Also this
// project's one reusable wire format for a member list, should a future RPC ever need one.
message ShardConfiguration {
  repeated ShardConfigMember members = 1;
}

message ShardConfigMember {
  string node_id = 1;
  string address = 2; // RaftGroupMember.Address, as a Uri string
}
